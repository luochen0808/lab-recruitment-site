<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>科研团队招聘官网</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 顶部标识 -->
  <div class="top-tag">
    <span class="dot"></span>
    2026 / 2027 Global Recruitment
  </div>

  <div class="container">
    <!-- 左侧文字区域 -->
    <div class="left-box">
      <h1>
        Decoding<br>
        the<br>
        <em>Future of</em><br>
        Mind
      </h1>
      <p>
        诚邀神经科学、脑机接口、硬件工程、人工智能方向优秀学者加入课题组，
        开展前沿交叉科研工作。
      </p>
      <div class="btn-group">
        <a href="#apply" class="btn btn-red">立即申请 →</a>
        <a href="#research" class="btn btn-border">研究方向</a>
      </div>
    </div>

    <!-- 右侧岗位卡片 -->
    <div class="right-card">
      <h3 class="card-title">申请</h3>
      <div class="job-list">
        <div class="job-item">博士研究生 <span>🎓</span></div>
        <div class="job-item">博士后研究员 <span>🔬</span></div>
        <div class="job-item">硬件研发工程师 <span>💻</span></div>
      </div>

      <h3 class="card-title">研究领域</h3>
      <div class="tag-list">
        <span class="tag">脑电信号</span>
        <span class="tag">神经解码</span>
        <span class="tag">微纳器件</span>
        <span class="tag">生物材料</span>
      </div>
    </div>
  </div>

  <!-- 背景装饰 -->
  <div class="bg-overlay"></div>
  <script src="script.js"></script>
</body>
</html>
